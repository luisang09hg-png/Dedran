<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedran - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <!-- Feather Icons for lightweight iconography -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 animate-fade-in">

    <div class="glass w-full max-w-md rounded-2xl p-8 slide-up-item animate-slide-up">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-brand-gradient rounded-xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <i data-feather="star" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold bg-brand-gradient text-gradient">Welcome back</h1>
            <p class="text-sm text-gray-500 mt-2 font-medium">Enter your details to access your workspace.</p>
        </div>

        <form id="signInForm" class="space-y-4">
            <div id="error-message" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-center gap-2">
                <i data-feather="alert-circle" class="w-4 h-4"></i>
                <span>Invalid credentials. Try again.</span>
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-gray-700">Email</label>
                <input type="email" id="email" class="w-full bg-white/50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="you@company.com" required>
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-gray-700">Password</label>
                    <a href="#" class="text-xs text-blue-600 hover:underline font-medium">Forgot password?</a>
                </div>
                <input type="password" id="password" class="w-full bg-white/50 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submitBtn" class="w-full btn-primary rounded-xl py-2.5 text-sm font-semibold mt-4 flex items-center justify-center gap-2">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Don't have an account? <a href="#" class="text-blue-600 hover:underline font-medium">Sign up</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        feather.replace();
        
        document.getElementById('signInForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('error-message');
            const email = document.getElementById('email').value;
            
            // Simulate loading
            btn.innerHTML = '<i data-feather="loader" class="w-4 h-4 animate-spin"></i> Signing in...';
            feather.replace();
            errorMsg.classList.add('hidden');
            
            setTimeout(() => {
                if(email.includes('error')) {
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = 'Sign In';
                } else {
                    window.location.href = 'dashboard.html';
                }
            }, 1000);
        });
    </script>
</body>
</html>
