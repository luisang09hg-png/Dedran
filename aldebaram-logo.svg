<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Aldebaram logo</title>
  <desc id="logoDesc">An ascending letter A whose right stroke flares into a four-point star, in orange-red on a dark navy rounded square.</desc>
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4D30"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="240" height="240" rx="52" fill="#0D0F17"/>
  <rect x="1" y="1" width="238" height="238" rx="51" fill="none" stroke="#2A2F45" stroke-width="1.5"/>

  <path d="M120 52 L76 176 L96 176 L108 142 L150 142"
        fill="none" stroke="url(#strokeGrad)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M120 52 L98 116 L112 116 Z" fill="#161926"/>

  <g transform="translate(163,150)">
    <path d="M0 -30 C 4 -10, 10 -4, 30 0 C 10 4, 4 10, 0 30 C -4 10, -10 4, -30 0 C -10 -4, -4 -10, 0 -30 Z"
          fill="url(#starGrad)"/>
    <circle cx="0" cy="0" r="4.5" fill="#FFE3D2"/>
  </g>
</svg>
